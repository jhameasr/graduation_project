<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letter of Gratitude</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&family=Playfair+Display:italic,wght@400;700&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #eaeaea; 
            --env-color: #ffffff; 
            --flap-color: #eeeeee; 
            --gold: #ffd700; 
            --space-bg: #050505; 
        }
        
        * { -webkit-user-select: none; user-select: none; outline: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            margin: 0; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            transition: background 1.5s ease;
            touch-action: none;
        }
        .serif { font-family: 'Playfair Display', serif; }

        #zoomLayer { display: flex; align-items: center; justify-content: center; width: 100%; height: 100vh; }

        #animationContainer {
            opacity: 0; transform: translateY(30px);
            animation: elegantEntry 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.3s; position: relative;
        }

        @keyframes elegantEntry { to { opacity: 1; transform: translateY(0); } }

        .envelope-wrapper { perspective: 1000px; width: min(380px, 90vw); height: min(250px, 60vw); z-index: 10; position: relative; }

        .envelope {
            position: relative; width: 100%; height: 100%; 
            background: var(--env-color); border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.6s ease;
        }
        
        .envelope::before {
            content: ""; position: absolute; top: 0; z-index: 5;
            border-top: min(130px, 32vw) solid var(--flap-color); 
            border-left: min(190px, 45vw) solid transparent;
            border-right: min(190px, 45vw) solid transparent; 
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .open .envelope::before { transform: rotateX(180deg); z-index: 0; }

        .inscription-area { position: relative; z-index: 10; text-align: center; width: 90%; transition: opacity 0.5s ease; }
        .open .inscription-area { opacity: 0; pointer-events: none; }
        
        .label-text { font-size: 8px; letter-spacing: 0.4em; color: rgba(0,0,0,0.4); text-transform: uppercase; transition: color 0.5s ease; }
        .dark-text .label-text { color: rgba(255,255,255,0.7); }

        #nameInput {
            background: transparent; border: none; width: 100%;
            text-align: center; color: #333; font-size: clamp(24px, 7vw, 36px);
            font-family: 'Mrs Saint Delafield', cursive;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            margin-top: 5px; margin-bottom: 15px;
            transition: color 0.5s ease, border-color 0.5s ease;
        }
        .dark-text #nameInput { color: #fff; border-bottom-color: rgba(255,255,255,0.3); }

        .wax-seal-btn {
            width: 55px; height: 55px; background: #222; border-radius: 50%;
            border: 2px solid #333; color: white; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-family: 'Playfair Display', serif; font-weight: bold;
            animation: sealPulse 3s infinite ease-in-out;
            transition: all 0.5s ease;
        }

        @keyframes sealPulse {
            0%, 100% { box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform: scale(1); }
            50% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        }

        .letter-card {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0);
            background: white; width: min(340px, 85vw); max-height: 70vh; 
            overflow-y: auto; padding: clamp(25px, 8vw, 45px);
            opacity: 0; visibility: hidden; z-index: 50;
            transition: transform 0.8s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.4s ease;
            box-shadow: 0 10px 60px rgba(0,0,0,0.25);
        }

        .unlocked { 
            cursor: grab; 
            outline: 2px solid var(--gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }
        .unlocked:active { cursor: grabbing; }

        .show-letter .letter-card { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        body.kim-mode { background: var(--space-bg); }
        .kim-card { 
            background: rgba(10, 10, 18, 0.92) !important; backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); color: white !important;
        }
        .kim-card h2, .kim-card p, .kim-card .serif, .kim-card #msgContainer { 
            color: #f0f4ff !important; 
        }

        .settings-hub {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            width: min(320px, 90vw); z-index: 100;
            opacity: 0; visibility: hidden; transition: 0.6s;
        }
        .show-letter .settings-hub { opacity: 1; visibility: visible; }

        .master-panel {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 100%; display: none; flex-direction: column; gap: 15px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .master-panel.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .kim-mode .master-panel { background: rgba(30, 30, 45, 0.9); color: white; border-color: rgba(255,255,255,0.1); }

        .gear-btn {
            width: 45px; height: 45px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer;
            transition: 0.3s; border: 1px solid rgba(0,0,0,0.05);
            color: #222;
        }
        .kim-mode .gear-btn { 
            background: #1e1e2d; 
            border-color: rgba(255,255,255,0.1);
            color: #ffffff !important; 
        }
        .gear-btn:active { transform: scale(0.9); }

        .control-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); } }
        @keyframes fall { to { transform: translateY(110vh); } }

        .toggle-drag-btn {
            position: absolute; top: 15px; left: 15px;
            font-size: 7px; text-transform: uppercase; letter-spacing: 0.2em;
            padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08);
            background: rgba(0,0,0,0.02); cursor: pointer; transition: 0.3s;
            z-index: 60;
        }
        .kim-card .toggle-drag-btn { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: white; }
        .is-unlocked-btn { background: var(--gold) !important; color: black !important; border-color: var(--gold) !important; font-weight: 800; }
        
        .close-btn {
            position: absolute; top: 15px; right: 15px;
            font-size: 14px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            opacity: 0.2; transition: opacity 0.3s; z-index: 60;
        }
        .close-btn:hover { opacity: 1; }

        input[type="range"] { -webkit-appearance: none; background: rgba(0,0,0,0.05); height: 4px; border-radius: 2px; width: 100%; }
        .kim-mode input[type="range"] { background: rgba(255,255,255,0.1); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #000; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .kim-mode input[type="range"]::-webkit-slider-thumb { background: #fff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="stars"></div>
    <div id="confetti-tank"></div>
    <audio id="bgMusic" loop preload="auto"></audio>

    <div id="zoomLayer">
        <div id="animationContainer">
            <div class="envelope-wrapper" id="envWrap">
                <div id="envBase" class="envelope">
                    <div class="inscription-area" id="inputZone">
                        <p class="label-text">From: Jhames Rianne</p>
                        <div class="mt-4">
                            <p class="label-text">To:</p>
                            <input type="text" id="nameInput" placeholder="Enter Key" autocomplete="off" oninput="checkPass(this.value)" />
                        </div>
                        <button onclick="handleOpen()" id="seal" class="wax-seal-btn">JR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="letterCard" class="letter-card">
        <button id="dragToggle" onclick="toggleDragMode()" class="toggle-drag-btn">Lock</button>
        <button onclick="handleClose()" class="close-btn">✕</button>
        
        <div class="flex justify-start items-center mb-10 mt-6">
            <div class="text-[8px] tracking-[0.3em] uppercase font-bold border-b border-zinc-200 pb-1">Valedictory Series</div>
        </div>
        
        <h2 class="text-xl font-light mb-5">Dear <span id="rName" class="serif italic"></span>,</h2>
        <div id="msgContainer" class="text-[13px] leading-relaxed font-normal mb-10 tracking-tight text-zinc-800 whitespace-pre-wrap"></div>
        
        <div class="pt-6 border-t border-zinc-100">
            <p class="text-[7px] uppercase tracking-[0.2em] text-zinc-400 mb-1">With Gratitude,</p>
            <p class="text-md serif italic text-black" id="sigName">Jhames Rianne</p>
        </div>
    </div>

    <div class="settings-hub">
        <div id="masterPanel" class="master-panel">
            <div class="flex justify-between items-center border-b border-black/5 pb-3 mb-2">
                <div>
                    <p id="songTitle" class="text-[10px] font-black uppercase tracking-widest">Song</p>
                    <p id="songArtist" class="text-[8px] opacity-60 uppercase">Artist</p>
                </div>
                <button id="playBtn" onclick="toggleMusic()" class="w-8 h-8 flex items-center justify-center bg-black text-white rounded-full text-[10px]">II</button>
            </div>
            
            <div class="control-row">
                <span class="text-[8px] uppercase font-bold opacity-40 w-12">Volume</span>
                <input type="range" min="0" max="1" step="0.01" value="0" id="volSlider" oninput="applyVolume(this.value)">
            </div>

            <div class="control-row">
                <span class="text-[8px] uppercase font-bold opacity-40 w-12">Zoom</span>
                <input type="range" min="0.5" max="2.0" step="0.01" value="1.0" id="zoomSlider" oninput="applyZoom(this.value)">
            </div>
        </div>
        
        <div class="gear-btn" onclick="toggleSettings()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </div>
    </div>

    <script>
        const DATA = {
            "space": { name: "Kim", theme: "space", bg: "#001f3f", flap: "#00152b", msg: `Congratulations, Kim! From the Hirono na nabanggit mo in one of our calls, I got the idea na you find figurines cool, kaya naghanap ako ng maireregalo sa’yo. Hindi ko naman alam na sobrang dami palang variations kaya medyo nahirapan ako to be honest. So, to make things easier, I created a theme. Space-themed! Kasi you're like an astronaut, in that you are not afraid to explore the unknown. You're so fascinating to me kasi ang lawak at lalim mong tao. \n\nI know nagiging inside joke na 'yung ginawa kong ghosting, pero regretful pa rin ako hanggang ngayon. You did not deserve that, and I hate that I let that happen. Now, I want to get to know you deeper. I want to make a meaningful connection with you. I want to be the person that you can talk to kapag nalulungkot ka, the one you can reach out to kapag may need ka, and someone that you can celebrate your wins with. Right now, I know what I want. I’m here for the long haul, kaya bear with me.\n\nMagc-college na tayo! It will be a big shift, and it's a bit bittersweet knowing na kapag nakapasa ako sa UP, we'll probably be going to different schools. BUT, I'm committed to making this work. No promises definitely, pero I will try my absolute best. I hope we'll still be able to make time for each other. Also just wanna say thank you for everything. I love what we have right now. I love being vulnerable with you. You make me feel so human, and I think of you so often on the daily na baka love na rin kita.`, song: "Across the Universe", artist: "The Beatles", file: "./assets/across-the-universe.mp3" },
            "strong": { name: "Ma'am Amada", theme: "grad", bg: "#ff85a2", flap: "#f76b8a", msg: `Hello po, Ma'am! Dahil hindi ako makakapag-speech, gumawa na lang po ako ng letter. This is my first time writing one po, so please bear with me haha.\n\nFirst off, thank you po sa lahat. I've grown so much in the one year na I spent po with STEM Forsythia. Not just as a student, but as a person overall. Every achievement and distinction I've earned in that period I dedicate to everyone that supported me along the way, and you were a big part of that journey po. \n\nI know how stressful this school year has been for you po, and so I want you to know na I appreciate everything you've done po. For standing up to the injustices na naranasan natin, hanggang sa pangangamusta sa amin even during the busiest days. You're such a good person po, seriously. \n\nWhile I'm leaving the school na, I am not forgetting anyone from the institution that nurtured me, lalong-lale na po kayo. The lessons I learned under your guidance are things I will carry with me as I step into college and beyond. Kapag may need po kayo in the future, anything at all, I will remain within reach po. Whether it's for technical help, a quick favor, or just a life update, please don't hesitate to message me.`, song: "Stop Crying Your Heart Out", artist: "Oasis", file: "./assets/stop-crying-your-heart-out.mp3" },
            "social": { name: "Ma'am Karen", theme: "grad", bg: "#ff85a2", flap: "#f76b8a", msg: `Hello po, Ma’am Karen! Dahil hindi po ako makakapag-speech para sa graduation, I decided to write letters to the people who really made an impact on my high school journey. Since I’m graduating now, I couldn't leave without sending one to you.\n\nFirst off, thank you so much po sa lahat. Even though hindi na kayo ang adviser ko this year, I really appreciate how you still make an effort na makipag-usap at mangamusta. It means a lot to me na kahit lumipat na ako ng section at dumaan ang Grade 12, nandoon pa rin ‘yung connection. You’ve always been so approachable and kind, and I just really like you as a person po. You have this way of making students feel comfortable and valued, and that’s something I’ll always admire about you.\n\nWhile I'm leaving the school na, I am not forgetting the teachers who genuinely cared for me. You are definitely one of them po. Please know that your kindness didn't go unnoticed. I’m moving on to college, but I will remain within reach po. If there’s ever anything you need or if you just want an update on how I’m doing, please don’t hesitate to reach out.`, song: "Here Comes the Sun", artist: "The Beatles", file: "./assets/here-comes-the-sun.mp3" },
            "evelyn": { name: "Mama", theme: "grad", bg: "#9b1c1c", flap: "#7f1616", msg: `Dahil hindi ako makakapag-speech, nagsulat na lang ako ng letter. Na-realize ko na I never wrote you a letter pa. There's always a first time for everything nga talaga. Alam niyo naman po na hindi ako ganoon ka-vocal pagdating sa nararamdaman ko, pero sana sa pamamagitan ng sulat na ito, kahit papaano ay maiparating ko sa inyo what I really feel. \n\nI hope you know how deeply grateful I am for everything. You are the very definition of a parent na inuuna ang anak bago ang sarili. Nakita ko lahat ng pagod niyo, mula sa pag-aasikaso sa amin sa bahay hanggang sa pagiging understanding sa bawat puyat at pagod ko sa school. Every medal, certificate, at panalo ko sa mga competitions, I dedicate to you and kay Daddy. Gusto ko kasi na maranasan niyo rin ang pakiramdam na manalo, at maramdaman na sulit ang bawat sakripisyo at pag-aalaga niyo.\n\nHigit sa lahat, I’m doing everything to make you proud. Kayo ni Daddy ang biggest inspiration ko, and the primary reason why I’m striving to be the best individual I can be. Thank you for being so supportive in the things I do. I still remember pa nung elementary na napagalitan niyo ko dahil hindi ako nataas ng kamay sa recitations. From that moment on, naging active na talaga ako. \n\nLove you so much, Mama! Kapag graduate na kaming lahat at settled na, we will give you the world, promise! Deserve niyo lahat ng pahinga at ginhawa sa buhay. Happy Graduation sa atin!`, song: "Time in a Bottle", artist: "Jim Croce", file: "./assets/time-in-a-bottle.mp3" },
            "matanda": { name: "Daddy", theme: "grad", bg: "#9b1c1c", flap: "#7f1616", msg: `Dahil hindi ako makakapag-speech, nagsulat na lang ako ng letter. Na-realize ko na I never wrote you a letter pa, and I thought graduation is the best time to finally do it.\n\nI am not very vocal, pero I hope you know how grateful I am for everything. Kayo ni Mama ang depinisyon ng isang magulang na inuuna ang kapakanan namin bago ang sa inyo. Thank you sa lahat ng sacrifices niyo, lalo na these past few years na madalang na kayo sa bahay dahil nagtatrabaho kayo sa Manila. Alam ko po na hindi biro ang mapalayo sa pamilya at ang hirap ng pagbiyahe at pagtatrabaho nang malayo para lang masuportahan kami. \n\nI hope you know na I’m working so hard in my studies to make you proud. I join competitions not just for my own growth, but for you guys as well. Gusto ko na bawat pagod niyo sa Manila, may katapat na tagumpay mula sa akin dito. Thank you for being so supportive always! Everything I have achieved thus far, I dedicate sa inyo. Kayo ang nagbigay sa akin ng pagkakataon na mangarap nang malaki. \n\nLove you so much, Daddy! Ingat palagi sa biyahe at sa trabaho. Happy Graduation to us!`, song: "Across the Universe", artist: "The Beatles", file: "./assets/across-the-universe.mp3" }
        };

        let fadeInterval, isUnlocked = false, currentScale = 1;
        let posX = 0, posY = 0, startX = 0, startY = 0;
        const letter = document.getElementById('letterCard');

        function checkPass(val) {
            const user = DATA[val.toLowerCase().trim()];
            const root = document.documentElement;
            if (user) {
                root.style.setProperty('--env-color', user.bg);
                root.style.setProperty('--flap-color', user.flap);
                document.getElementById('inputZone').classList.add('dark-text');
                document.getElementById('seal').style.background = user.flap;
            } else {
                root.style.setProperty('--env-color', '#ffffff');
                root.style.setProperty('--flap-color', '#eeeeee');
                document.getElementById('inputZone').classList.remove('dark-text');
                document.getElementById('seal').style.background = "#222";
            }
        }

        function handleOpen() {
            const user = DATA[document.getElementById('nameInput').value.toLowerCase().trim()];
            if (!user) return alert("Incorrect Key.");
            
            document.getElementById('envWrap').classList.add('open');
            resetCoordinates();
            renderContent(user);

            setTimeout(() => {
                document.body.classList.add('show-letter');
            }, 600); 
        }

        function handleClose() {
            const m = document.getElementById('bgMusic');
            fadeOutMusic(m, document.getElementById('volSlider'));
            
            document.body.classList.remove('show-letter');
            document.getElementById('masterPanel').classList.remove('active');

            setTimeout(() => {
                document.getElementById('envWrap').classList.remove('open');
                m.pause(); m.currentTime = 0;
                document.getElementById('playBtn').innerText = "▶";
                document.getElementById('stars').innerHTML = "";
                document.getElementById('confetti-tank').innerHTML = "";
                document.body.classList.remove('kim-mode');
                document.getElementById('letterCard').classList.remove('kim-card');
                resetCoordinates();
            }, 800);
        }

        function resetCoordinates() {
            posX = 0; posY = 0; currentScale = 1; isUnlocked = false;
            document.getElementById('dragToggle').innerText = "Lock";
            document.getElementById('dragToggle').classList.remove('is-unlocked-btn');
            letter.classList.remove('unlocked');
            document.getElementById('zoomSlider').value = 1;
            letter.style.transform = '';
        }

        function renderContent(user) {
            document.getElementById('rName').innerText = user.name;
            document.getElementById('msgContainer').innerText = user.msg;
            document.getElementById('songTitle').innerText = user.song;
            document.getElementById('songArtist').innerText = user.artist;
            const m = document.getElementById('bgMusic');
            m.src = user.file; m.volume = 0;
            m.load();
            m.play().then(() => {
                document.getElementById('playBtn').innerText = "II";
                fadeInMusic(m, document.getElementById('volSlider'));
            }).catch(() => document.getElementById('playBtn').innerText = "▶");

            if (user.theme === 'space') { 
                document.body.classList.add('kim-mode'); 
                document.getElementById('letterCard').classList.add('kim-card'); 
                genStars(); 
            } else { 
                genConfetti(user.bg); 
            }
        }

        function toggleSettings() {
            document.getElementById('masterPanel').classList.toggle('active');
        }

        function fadeInMusic(audio, slider) {
            clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (audio.volume < 0.8) { audio.volume = Math.min(audio.volume + 0.02, 0.8); slider.value = audio.volume; }
                else clearInterval(fadeInterval);
            }, 50);
        }

        function fadeOutMusic(audio, slider) {
            clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (audio.volume > 0) { audio.volume = Math.max(audio.volume - 0.05, 0); slider.value = audio.volume; }
                else { clearInterval(fadeInterval); audio.pause(); }
            }, 40);
        }

        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            if (m.paused) { m.play(); document.getElementById('playBtn').innerText = "II"; } 
            else { m.pause(); document.getElementById('playBtn').innerText = "▶"; }
        }

        function applyVolume(val) { clearInterval(fadeInterval); document.getElementById('bgMusic').volume = val; }
        function applyZoom(val) { currentScale = val; updateTransform(); }

        function toggleDragMode() {
            isUnlocked = !isUnlocked;
            const btn = document.getElementById('dragToggle');
            btn.innerText = isUnlocked ? "Unlock" : "Lock";
            btn.classList.toggle('is-unlocked-btn', isUnlocked);
            letter.classList.toggle('unlocked', isUnlocked);
        }

        letter.addEventListener('mousedown', dragStart);
        letter.addEventListener('touchstart', dragStart, {passive: false});

        function dragStart(e) {
            if (!isUnlocked || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
            startY = (e.type === 'touchstart') ? e.touches[0].clientY : e.clientY;
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, {passive: false});
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }

        function dragMove(e) {
            if (e.type === 'touchmove') e.preventDefault();
            const x = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
            const y = (e.type === 'touchmove') ? e.touches[0].clientY : e.clientY;
            posX += (x - startX); posY += (y - startY);
            startX = x; startY = y;
            updateTransform();
        }

        function dragEnd() { document.removeEventListener('mousemove', dragMove); document.removeEventListener('touchmove', dragMove); }

        function updateTransform() {
            letter.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${currentScale})`;
        }

        function genStars() {
            const container = document.getElementById('stars');
            for(let i=0; i<60; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3;
                s.style.cssText = `top:${Math.random()*100}%; left:${Math.random()*100}%; width:${size}px; height:${size}px; --d:${Math.random()*3+2}s;`;
                container.appendChild(s);
            }
        }
        
        function genConfetti(color) {
            const container = document.getElementById('confetti-tank');
            for(let i=0; i<25; i++) {
                const c = document.createElement('div');
                c.style.cssText = `position:fixed; width:6px; height:6px; background:${color}; left:${Math.random()*100}vw; top:-10px; opacity:0.3; border-radius:50%; pointer-events:none; animation: fall ${Math.random()*3+3}s linear infinite;`;
                container.appendChild(c);
            }
        }
    </script>
</body>
